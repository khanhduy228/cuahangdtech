<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D.Tech - Cửa hàng công nghệ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">D.Tech</div>
        
        <ul class="nav-links">
            <li><a href="#">iPhone</a></li>
            <li><a href="#">iPad</a></li>
            <li><a href="#">Phụ Kiện</a></li>
        </ul>

        <div class="search-container">
            <input type="text" placeholder="Search.." class="search-input">
            <span class="search-icon">🔍</span>
        </div>

        <div class="cart">
            <img src="assets/cart.png" alt="Giỏ hàng" class="cart-img">
        </div>
    </nav>
    <section class="banner">
    <div class="banner-left">
        <h1>iPhone 17 Series</h1>
    </div>

    <div class="banner-center">
        <img src="assets/banner.png" alt="iPhone 17 Series">
    </div>
    <div class="banner-right">
        <button class="buy-now">MUA NGAY</button>
        <p class="promo-info">TRẢ GÓP 0% LÃI SUẤT <br> TRẢ TRƯỚC 0Đ</p>
    </div>
</section>

</body>
</html>
