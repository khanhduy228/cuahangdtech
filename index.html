<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D.Tech - Cửa hàng công nghệ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">D.Tech</div>
        
        <ul class="nav-links">
            <li><a href="#">iPhone</a></li>
            <li><a href="#">iPad</a></li>
            <li><a href="#">Phụ Kiện</a></li>
        </ul>

        <div class="search-container">
            <input type="text" placeholder="Search.." class="search-input">
            <span class="search-icon">🔍</span>
        </div>

        <div class="cart">
            <img src="assets/cart.png" alt="Giỏ hàng" class="cart-img">
        </div>
    </nav>
    <section class="banner">
    <div class="banner-left">
        <h1>iPhone 17 Series</h1>
    </div>

    <div class="banner-center">
        <img src="assets/banner.png" alt="iPhone 17 Series">
    </div>
    <div class="banner-right">
        <button class="buy-now">MUA NGAY</button>
        <p class="promo-info">TRẢ GÓP 0% LÃI SUẤT <br> TRẢ TRƯỚC 0Đ</p>
    </div>
</section>

        <div class="footer-info">
            <h2 class="footer-title">D.Tech</h2>
            <p class="footer-text">ĐỊA CHỈ : 180 CAO LỖ , PHƯỜNG CHÁNH HƯNG , TP.HCM</p>
            <p class="footer-text">TỔNG ĐÀI HỖ TRỢ : 0123789456</p>

            <div class="footer-social">
                <span class="social-text">LIÊN HỆ CHO CHÚNG TÔI QUA :</span>
                <div class="social-icons">
                    <img src="assets/fb.png" alt="Facebook">
                    <img src="assets/tiktok.png" alt="TikTok">
                    <img src="assets/ig.png" alt="Instagram">
                </div>
            </div>
        </div>
        <div class="footer-map">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3919.9544158100557!2d106.67525717465842!3d10.73800245989932!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x31752f62a90e5db3%3A0xbdc1a8155f33f1d5!2zMTgwIENhbyBM4buXLCBQaMaw4budbmcgNCwgUXXhuq1uIDgsIEjhu5MgQ2jDrSBNaW5oLCBWaeG7h3QgTmFt!5e0!3m2!1svi!2s!4v1715012345678!5m2!1svi!2s"

</html>
